name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Tests (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.21", "1.22"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Run tests
        run: go test ./tests/... -v -race

      - name: Vet
        run: go vet ./...

  build-binary:
    name: Build runc binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build
        run: |
          go build -ldflags="-s -w" -o runc ./cmd/runc
          ls -lh runc
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: runc-linux-amd64
          path: runc
